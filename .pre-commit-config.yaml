# Pre-commit hooks — the fast gates on every commit; the full suite runs in CI + `make check`.
# Install with: make hooks  (or: pre-commit install)
minimum_pre_commit_version: "3.5.0"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-toml
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: detect-private-key
      - id: no-commit-to-branch
        args: [--branch, main, --branch, master]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.19
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  # Project-configured gates (read pyproject) — run via the local environment.
  - repo: local
    hooks:
      - id: mypy
        name: mypy (strict)
        entry: uv run mypy src
        language: system
        types: [python]
        pass_filenames: false
      - id: import-linter
        name: import-linter (engines stay off the import path)
        entry: bash -c 'PYTHONPATH=src uv run lint-imports'
        language: system
        types: [python]
        pass_filenames: false

  # Secrets scanning — catches committed keys/tokens beyond detect-private-key.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
