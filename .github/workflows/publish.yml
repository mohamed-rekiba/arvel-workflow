name: Publish

# Publishes arvel-workflow to PyPI when a release tag is pushed (e.g. `v1.0.0`,
# `v1.0.0-rc.1`). Tags are created by release-please when a release PR merges.
#
# Auth is PyPI Trusted Publishing (OIDC) — no API token stored. The PyPI
# project must be configured as a Trusted Publisher for this repo + this
# workflow + the `pypi` environment before the first publish:
# https://docs.pypi.org/trusted-publishers/  (fail-closed until then.)

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.14"

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    permissions:
      contents: write # attach built artifacts to the GitHub Release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - name: Build wheel + sdist
        run: uv build --out-dir dist
      - name: Validate distribution metadata
        run: uvx twine check dist/*
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: dist/
          retention-days: 30
      - name: Attach distribution to GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" dist/* --clobber

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/arvel-workflow
    permissions:
      id-token: write # OIDC for Trusted Publishing
    steps:
      - name: Download built distribution
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI (Trusted Publisher, OIDC)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/
          print-hash: true
          verbose: true
