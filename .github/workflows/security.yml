name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily 03:17 UTC catches new CVEs in pinned deps without waiting for PRs.
    - cron: "17 3 * * *"

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.14"

jobs:
  sast-bandit:
    name: SAST (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - run: uv sync --all-extras --frozen
      - name: bandit
        run: uv run bandit -q -r src

  sast-semgrep:
    name: SAST (semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.163.0
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: semgrep scan
        # Rules suppressed as false positives for this framework:
        # - non-literal-import: internal framework loaders from trusted config, not user input
        # - avoid-sqlalchemy-text: DDL/schema builders with developer-controlled identifiers
        # - dangerous-annotations-usage: ORM internals writing __annotations__ for SQLAlchemy
        # - eval-detected: type annotation resolution mirroring typing.get_type_hints internals
        # - direct-use-of-jinja2: arvel-workflow view engine; autoescape is explicitly enabled
        # - explicit-unescape-with-markup: Markup() wraps HTML already produced by arvel-workflow's own
        #   autoescaping Jinja env (e.g. paginator links()) — trusted output, not external input
        # - directly-returned-format-string: fires on any `return f"..."`; the hit is the CSRF
        #   middleware's origin-string helper (compared, never rendered) — arvel-workflow has no Flask routes
        # - uv-missing-dependency-cooldown: the cooldown already lives at the right layer for a
        #   fully-locked project (dependabot cooldown + every CI install runs --frozen); uv's
        #   exclude-newer is either a rolling window (permanently desyncs uv.lock from
        #   `uv lock --check`) or a frozen absolute date (blocks dependabot bumps) — both worse
        run: >-
          semgrep scan --config=auto --error
          --exclude-rule python.lang.security.audit.non-literal-import.non-literal-import
          --exclude-rule python.sqlalchemy.security.audit.avoid-sqlalchemy-text.avoid-sqlalchemy-text
          --exclude-rule python.lang.security.audit.dangerous-annotations-usage.dangerous-annotations-usage
          --exclude-rule python.lang.security.audit.eval-detected.eval-detected
          --exclude-rule python.flask.security.xss.audit.direct-use-of-jinja2.direct-use-of-jinja2
          --exclude-rule python.flask.security.xss.audit.explicit-unescape-with-markup.explicit-unescape-with-markup
          --exclude-rule python.flask.security.audit.directly-returned-format-string.directly-returned-format-string
          --exclude-rule package_managers.uv.uv-missing-dependency-cooldown.uv-missing-dependency-cooldown
        env:
          SEMGREP_RULES: "p/python p/security-audit p/owasp-top-ten"

  sca:
    name: SCA (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - run: uv sync --all-extras --frozen
      - name: pip-audit
        # One documented carve-out — see SECURITY.md / DR-0008. Any OTHER new
        # high/critical CVE blocks. Drop the ignore when asyncmy ships a fix.
        run: uv run pip-audit --ignore-vuln GHSA-qhqw-rrw9-25rm

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
          GITLEAKS_ENABLE_SUMMARY: "true"

  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    needs: [sca]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - name: Generate CycloneDX SBOM
        run: |
          uv export --no-dev --no-hashes --format requirements-txt > req-arvel-workflow.txt
          uvx cyclonedx-py requirements req-arvel-workflow.txt \
            --output-format JSON \
            --output-file sbom-arvel-workflow.cdx.json
          rm -f req-arvel-workflow.txt
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom
          path: sbom-arvel-workflow.cdx.json
          retention-days: 90
